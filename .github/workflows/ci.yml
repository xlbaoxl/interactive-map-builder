name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q -m "not browser"

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest -q -m browser

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build --wheel
      - name: Install wheel in a clean environment and build outside the repository
        run: |
          python -m venv /tmp/imb-wheel
          /tmp/imb-wheel/bin/python -m pip install --upgrade pip
          /tmp/imb-wheel/bin/python -m pip install --force-reinstall dist/*.whl
          mkdir -p /tmp/imb-project
          cp -R assets/examples/map-list/. /tmp/imb-project/
          cd /tmp
          /tmp/imb-wheel/bin/interactive-map-builder build \
            --spec /tmp/imb-project/map_spec.json \
            --out /tmp/imb-dist
          /tmp/imb-wheel/bin/interactive-map-builder verify --dist /tmp/imb-dist
          test -s /tmp/imb-dist/map.html
          test -s /tmp/imb-dist/build_report.json
